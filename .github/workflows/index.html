<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupesh | LinkedIn Profile</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0077b5, #00c6ff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Card Container */
        .profile-card {
            background: white;
            width: 350px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px 30px;
            text-align: center;
            animation: fadeIn 1.2s ease-in-out;
            position: relative;
        }

        /* Profile Image */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid #0077b5;
            margin-bottom: 20px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

            .profile-img:hover {
                transform: scale(1.1) rotate(5deg);
            }

        /* Name */
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        /* Title */
        h3 {
            font-weight: 400;
            color: #0077b5;
            margin-bottom: 20px;
        }

        /* About */
        p {
            font-size: 14px;
            color: #555;
            margin-bottom: 25px;
        }

        /* Button */
        .btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 30px;
            background: #0077b5;
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.4s ease;
            position: relative;
            overflow: hidden;
        }

            .btn:hover {
                background: #005f8d;
                transform: translateY(-3px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            }

        /* Social Icons */
        .socials {
            margin-top: 25px;
        }

            .socials a {
                margin: 0 10px;
                text-decoration: none;
                color: #0077b5;
                font-size: 20px;
                transition: 0.3s;
            }

                .socials a:hover {
                    color: #005f8d;
                    transform: scale(1.3);
                }

        /* Floating Background Circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            animation: float 6s infinite ease-in-out;
        }

        .circle1 {
            width: 200px;
            height: 200px;
            top: -50px;
            left: -50px;
        }

        .circle2 {
            width: 150px;
            height: 150px;
            bottom: -40px;
            right: -40px;
            animation-delay: 2s;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(20px);
            }
        }
    </style>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/4d3c8d9b6e.js" crossorigin="anonymous"></script>

</head>
<body>

    <div class="profile-card">
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>

        <img src="https://via.placeholder.com/120" alt="Profile Picture" class="profile-img">

        <h1>Rupesh</h1>
        <h3>Software Developer</h3>

        <p>
            Passionate developer with experience in web development,
            UI/UX design, and building modern responsive websites.
        </p>

        <a href="#" class="btn">View LinkedIn Profile</a>

        <div class="socials">
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
    </div>

</body>
</html>
